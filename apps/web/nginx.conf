worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile          on;
  tcp_nopush        on;
  tcp_nodelay       on;
  keepalive_timeout 65;
  server_tokens     off;

  # gzip — keep modest defaults; assets are already minified by Vite
  gzip              on;
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml
    font/woff
    font/woff2;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  server {
    listen      80;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    # Long-cache hashed assets emitted by Vite under /assets/
    location /assets/ {
      access_log off;
      expires    1y;
      add_header Cache-Control "public, immutable";
      try_files  $uri =404;
    }

    # Common static asset extensions: long cache, but allow re-validation
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp|avif|map)$ {
      access_log off;
      expires    1y;
      add_header Cache-Control "public, immutable";
      try_files  $uri =404;
    }

    # index.html must never be cached so new deploys are picked up immediately
    location = /index.html {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      add_header Pragma        "no-cache";
      add_header Expires       "0";
      try_files  $uri =404;
    }

    # Lightweight liveness endpoint for HEALTHCHECK / k8s probes
    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # SPA fallback — every unknown route serves index.html for client-side routing
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
