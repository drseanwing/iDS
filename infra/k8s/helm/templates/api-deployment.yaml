{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opengrade.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opengrade.labels" . | nindent 4 }}
    app: api
    component: backend
spec:
  replicas: {{ .Values.api.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Ensure continuous availability
  selector:
    matchLabels:
      {{- include "opengrade.selectorLabels" . | nindent 6 }}
      app: api
  template:
    metadata:
      labels:
        {{- include "opengrade.selectorLabels" . | nindent 8 }}
        app: api
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.api.metricsPort }}"
        prometheus.io/path: "/metrics"
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}

      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}

      securityContext:
        {{- toYaml .Values.api.securityContext | nindent 8 }}

      {{- if .Values.api.affinity }}
      affinity:
        {{- if eq .Values.api.affinity.podAntiAffinity "preferred" }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - api
                topologyKey: kubernetes.io/hostname
        {{- else if eq .Values.api.affinity.podAntiAffinity "required" }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - api
              topologyKey: kubernetes.io/hostname
        {{- end }}
      {{- end }}

      {{- if .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.api.nodeSelector | nindent 8 }}
      {{- end }}

      {{- if .Values.api.tolerations }}
      tolerations:
        {{- toYaml .Values.api.tolerations | nindent 8 }}
      {{- end }}

      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      initContainers:
        # Wait for database to be ready
        - name: wait-for-db
          image: "{{ .Values.postgresql.image.registry }}/{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ include "opengrade.fullname" . }}-postgres -p 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000

      containers:
        - name: api
          image: "{{ .Values.api.image.registry }}/{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.api.containerPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.api.metricsPort }}
              protocol: TCP

          # Environment variables
          env:
            # General
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ include "opengrade.fullname" . }}-config
                  key: NODE_ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "opengrade.fullname" . }}-config
                  key: LOG_LEVEL
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "opengrade.fullname" . }}-config
                  key: ENVIRONMENT

            # Database
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.existingSecret }}
                  key: database-url
              optional: false
            - name: DB_HOST
              value: "{{ include "opengrade.fullname" . }}-postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "{{ .Values.postgresql.auth.database }}"
            - name: DB_USER
              value: "{{ .Values.postgresql.auth.username }}"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.existingSecret }}
                  key: db-password

            # Redis
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.existingSecret }}
                  key: redis-url
              optional: true
            - name: REDIS_HOST
              value: "{{ include "opengrade.fullname" . }}-redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.existingSecret }}
                  key: redis-password

            # Keycloak (OIDC)
            - name: KEYCLOAK_URL
              value: "http://{{ include "opengrade.fullname" . }}-keycloak:{{ .Values.keycloak.service.port }}"
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: {{ include "opengrade.fullname" . }}-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_CLIENT_ID
              value: "opengrade-api"
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.existingSecret }}
                  key: keycloak-client-secret

            # S3 / MinIO
            - name: S3_ENDPOINT
              value: "http://{{ include "opengrade.fullname" . }}-minio:{{ .Values.minio.service.port }}"
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.existingSecret }}
                  key: s3-access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.existingSecret }}
                  key: s3-secret-key
            - name: S3_BUCKET
              value: "opengrade"
            - name: S3_REGION
              valueFrom:
                configMapKeyRef:
                  name: {{ include "opengrade.fullname" . }}-config
                  key: S3_REGION

            # API Server
            - name: PORT
              value: "{{ .Values.api.containerPort }}"
            - name: API_HOST
              value: "0.0.0.0"
            - name: CORS_ORIGIN
              value: "{{ .Values.api.env.CORS_ORIGIN }}"

            # Additional environment variables from configMap
            {{- range $key, $value := .Values.api.env }}
            {{- if not (has $key (list "NODE_ENV" "LOG_LEVEL" "CORS_ORIGIN" "S3_REGION")) }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}

          # Health checks
          {{- if .Values.api.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.api.livenessProbe.httpGet.path }}
              port: {{ .Values.api.livenessProbe.httpGet.port }}
              scheme: HTTP
            initialDelaySeconds: {{ .Values.api.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.api.livenessProbe.failureThreshold }}
          {{- end }}

          {{- if .Values.api.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.readinessProbe.httpGet.path }}
              port: {{ .Values.api.readinessProbe.httpGet.port }}
              scheme: HTTP
            initialDelaySeconds: {{ .Values.api.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.api.readinessProbe.failureThreshold }}
          {{- end }}

          # Resource management
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}

          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL

          # Volume mounts
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /home/node/.npm

      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}

      # Termination grace period for graceful shutdown
      terminationGracePeriodSeconds: 30

      # DNS policy for service discovery
      dnsPolicy: ClusterFirst
      restartPolicy: Always

{{- end }}
