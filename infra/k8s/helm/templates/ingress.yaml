{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "opengrade.fullname" . }}-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opengrade.labels" . | nindent 4 }}
    app: ingress
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.ingress.tls.enabled }}
    cert-manager.io/issuer: {{ .Values.ingress.tls.issuer }}
    {{- end }}
    # Security headers
    nginx.ingress.kubernetes.io/ssl-redirect: "{{ .Values.ingress.tls.enabled }}"
    {{- if .Values.ingress.tls.enabled }}
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    {{- end }}
    # CORS headers
    {{- if .Values.ingress.cors.enabled }}
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "{{ .Values.ingress.cors.allowOrigin }}"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "{{ .Values.ingress.cors.allowMethods }}"
    nginx.ingress.kubernetes.io/cors-allow-headers: "{{ .Values.ingress.cors.allowHeaders }}"
    {{- end }}
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}

  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        {{- range .Values.ingress.hosts }}
        - {{ .host }}
        {{- end }}
      secretName: {{ .Values.ingress.tls.certSecretName }}
  {{- end }}

  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq .backend "api" }}
                name: {{ include "opengrade.fullname" $ }}-api
                port:
                  number: {{ $.Values.api.service.port }}
                {{- else if eq .backend "web" }}
                name: {{ include "opengrade.fullname" $ }}-web
                port:
                  number: {{ $.Values.web.service.port }}
                {{- else if eq .backend "keycloak" }}
                name: {{ include "opengrade.fullname" $ }}-keycloak
                port:
                  number: {{ $.Values.keycloak.service.port }}
                {{- else if eq .backend "minio" }}
                name: {{ include "opengrade.fullname" $ }}-minio
                port:
                  number: {{ $.Values.minio.service.port }}
                {{- end }}
          {{- end }}
    {{- end }}

---
{{- if .Values.ingress.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "opengrade.fullname" . }}-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opengrade.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.ingress.tls.certSecretName }}
  issuerRef:
    name: {{ .Values.ingress.tls.issuer }}
    kind: ClusterIssuer
  dnsNames:
    {{- range .Values.ingress.hosts }}
    - {{ .host }}
    {{- end }}
  duration: 2160h  # 90 days
  renewBefore: 720h  # 30 days
{{- end }}
{{- end }}
