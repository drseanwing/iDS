{{- if .Values.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opengrade.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opengrade.labels" . | nindent 4 }}
    app: web
    component: frontend
  {{- with .Values.web.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.web.service.type }}
  selector:
    {{- include "opengrade.selectorLabels" . | nindent 4 }}
    app: web
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
{{- end }}
