{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opengrade.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opengrade.labels" . | nindent 4 }}
    app: web
    component: frontend
spec:
  replicas: {{ .Values.web.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Ensure continuous availability
  selector:
    matchLabels:
      {{- include "opengrade.selectorLabels" . | nindent 6 }}
      app: web
  template:
    metadata:
      labels:
        {{- include "opengrade.selectorLabels" . | nindent 8 }}
        app: web
        component: frontend
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}

      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}

      securityContext:
        {{- toYaml .Values.web.securityContext | nindent 8 }}

      {{- if .Values.web.affinity }}
      affinity:
        {{- if eq .Values.web.affinity.podAntiAffinity "preferred" }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - web
                topologyKey: kubernetes.io/hostname
        {{- else if eq .Values.web.affinity.podAntiAffinity "required" }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - web
              topologyKey: kubernetes.io/hostname
        {{- end }}
      {{- end }}

      {{- if .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.web.nodeSelector | nindent 8 }}
      {{- end }}

      {{- if .Values.web.tolerations }}
      tolerations:
        {{- toYaml .Values.web.tolerations | nindent 8 }}
      {{- end }}

      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: web
          image: "{{ .Values.web.image.registry }}/{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.web.containerPort }}
              protocol: TCP

          # Build and serve
          command:
            - /bin/sh
            - -c
            - |
              npm run build && npm run preview

          # Environment variables for build-time configuration
          env:
            # API configuration
            - name: VITE_API_URL
              value: "https://api.{{ .Values.global.domain }}/api"

            # Keycloak configuration
            - name: VITE_KEYCLOAK_URL
              value: "https://auth.{{ .Values.global.domain }}"
            - name: VITE_KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: {{ include "opengrade.fullname" . }}-config
                  key: KEYCLOAK_REALM
            - name: VITE_KEYCLOAK_CLIENT_ID
              value: "opengrade-web"

            # Application settings
            - name: NODE_ENV
              value: "production"
            - name: VITE_DEBUG
              value: "false"

          # Health checks
          {{- if .Values.web.healthCheck.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.web.healthCheck.path }}
              port: {{ .Values.web.containerPort }}
              scheme: HTTP
            initialDelaySeconds: {{ .Values.web.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.web.healthCheck.periodSeconds }}
            timeoutSeconds: {{ .Values.web.healthCheck.timeoutSeconds }}
            failureThreshold: {{ .Values.web.healthCheck.failureThreshold }}

          readinessProbe:
            httpGet:
              path: {{ .Values.web.healthCheck.path }}
              port: {{ .Values.web.containerPort }}
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          {{- end }}

          # Resource management
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}

          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL

          # Volume mounts
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-cache
              mountPath: /home/node/.npm
            - name: build-cache
              mountPath: /app/node_modules

      volumes:
        - name: tmp
          emptyDir: {}
        - name: app-cache
          emptyDir: {}
        - name: build-cache
          emptyDir: {}

      # Termination grace period
      terminationGracePeriodSeconds: 30

      # DNS policy
      dnsPolicy: ClusterFirst
      restartPolicy: Always

{{- end }}
